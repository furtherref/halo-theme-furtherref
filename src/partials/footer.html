<footer class="mt-10 border-t border-gray-100 bg-white py-6 dark:border-slate-700 dark:bg-slate-800">
  <div
    class="mx-auto flex max-w-7xl flex-col gap-3 px-4 text-sm text-gray-500 dark:text-slate-300 sm:flex-row sm:items-center sm:justify-between lg:px-6"
  >
    <div class="flex flex-wrap items-center justify-center gap-x-3 gap-y-2 sm:justify-start">
      <span>
        ©
        <th:block th:text="${#dates.format(new java.util.Date().getTime(), 'yyyy')}" />
        <a href="/" class="hover:underline" th:text="${site.title}"></a>. All Rights Reserved.
      </span>
      <span th:if="${not #strings.isEmpty(theme.config.beian.icp_text)}">
        <a
          href="https://beian.miit.gov.cn/"
          class="hover:underline"
          target="_blank"
          th:href="${theme.config.beian.icp_link}"
          th:text="${theme.config.beian.icp_text}"
        ></a>
      </span>
      <span th:if="${not #strings.isEmpty(theme.config.beian.gongan_text)}" class="inline-flex items-center gap-1">
        <img th:src="@{/assets/images/gongan_beian.png}" class="size-4" alt="gongan_beian" />
        <a
          href="https://beian.mps.gov.cn/#/query/webSearch"
          class="hover:underline"
          target="_blank"
          th:href="${theme.config.beian.gongan_link}"
          th:text="${theme.config.beian.gongan_text}"
        ></a>
      </span>
    </div>
    <div class="flex items-center justify-center gap-4 sm:justify-end">
      <a
        href="https://github.com/furtherref"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="GitHub"
        class="text-gray-500 transition-colors hover:text-gray-900 dark:text-slate-300 dark:hover:text-white"
      >
        <span class="i-simple-icons-github block text-lg"></span>
      </a>
      <span class="text-center sm:text-right">
        Powered by
        <a href="https://halo.run" class="hover:underline" target="_blank">Halo</a>.
      </span>
    </div>
  </div>
</footer>
