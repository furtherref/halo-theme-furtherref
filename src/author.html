<include src="layout.html">
  <template name="head">
    <title th:text="|#{page.author.title(${author.spec.displayName})} - ${site.title}|"></title>
  </template>
  <template name="hero">
    <section th:if="${theme.config.layout.content_header}">
      <div class="relative">
        <div
          class="saturate-110 relative h-[28rem] bg-cover bg-center bg-no-repeat brightness-110 sm:h-96"
          th:style="|background-image: url('${theme.config.layout.header_background_image}')|"
        ></div>
        <header
          class="absolute inset-0 z-10 flex flex-col items-center justify-center px-4 text-center text-white [text-shadow:0_2px_12px_rgb(0_0_0_/_0.55)]"
        >
          <img
            th:src="${author.spec.avatar ?: #theme.assets('/images/default-avatar.svg')}"
            th:alt="${author.spec.displayName}"
            class="size-24 rounded-full border-4 border-white object-cover shadow-lg sm:size-28"
          />
          <h1 class="mt-5 text-3xl font-semibold sm:text-4xl" th:text="${author.spec.displayName}"></h1>
          <p
            class="mt-4 max-w-2xl text-sm font-medium leading-7 text-white/90 sm:text-base"
            th:text="${author.spec.bio ?: site.subtitle}"
          ></p>
        </header>
      </div>
    </section>
  </template>
  <section class="mx-auto mt-6 grid max-w-7xl grid-cols-1 gap-6 px-4 md:grid-cols-[1fr_18rem] lg:px-6">
    <div class="z-0 min-w-0">
      <div
        id="post-list"
        th:if="${posts.total gt 0}"
        th:with="postItems=${posts.items},list_layout=${theme.config.layout.post_list_layout}"
        class="grid grid-cols-1 gap-6"
        th:classappend="|${list_layout == 'grid_3' ? 'md:grid-cols-2 xl:grid-cols-3' : ''} ${list_layout == 'grid_2' ? 'md:grid-cols-2' : ''}|"
      >
        <th:block th:each="post : ${postItems}">
          <th:block
            th:replace="~{modules/post-card :: post-card(${post},true,true,true,${list_layout == 'single' ? 'column' : 'row'})}"
          />
        </th:block>
      </div>

      <div th:if="${posts.total == 0}" class="mt-6 flex items-center justify-center">
        <span class="text-sm font-light text-gray-600 dark:text-slate-200" th:text="#{common.noPosts}"></span>
      </div>

      <th:block
        th:replace="~{modules/pagination :: pagination(context = |${author.status.permalink}/|, prevUrl = ${posts.prevUrl}, nextUrl = ${posts.nextUrl}, totalPages = ${posts.totalPages}, page = ${posts.page}, hasPrevious = ${posts.hasPrevious()}, hasNext = ${posts.hasNext()})}"
      />
    </div>
    <th:block th:replace="~{modules/sidebar :: sidebar(prepend = null)}" />
  </section>
</include>
